<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="dither">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="4" seed="42"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 1"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa44"/>
      <stop offset="30%" stop-color="#cc7722"/>
      <stop offset="60%" stop-color="#885511"/>
      <stop offset="100%" stop-color="#221100"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0800"/>

  <!-- Eyelid shape -->
  <ellipse cx="100" cy="100" rx="85" ry="55" fill="none" stroke="#332200" stroke-width="1"/>

  <!-- Iris -->
  <circle cx="100" cy="100" r="40" fill="url(#iris)" opacity="0.9" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="100" cy="100" r="15" fill="#0a0800"/>

  <!-- Scan lines across iris -->
  <g stroke="#ffaa44" stroke-width="0.5" opacity="0.4">
    <line x1="60" y1="80" x2="140" y2="80"/>
    <line x1="60" y1="90" x2="140" y2="90"/>
    <line x1="60" y1="100" x2="140" y2="100"/>
    <line x1="60" y1="110" x2="140" y2="110"/>
    <line x1="60" y1="120" x2="140" y2="120"/>
  </g>

  <!-- Targeting crosshair -->
  <g stroke="#ffcc66" stroke-width="0.5" opacity="0.6" filter="url(#glow)">
    <line x1="100" y1="40" x2="100" y2="70"/>
    <line x1="100" y1="130" x2="100" y2="160"/>
    <line x1="40" y1="100" x2="70" y2="100"/>
    <line x1="130" y1="100" x2="160" y2="100"/>
    <circle cx="100" cy="100" r="50" fill="none"/>
    <circle cx="100" cy="100" r="30" fill="none" stroke-dasharray="4 4"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#ffaa44" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 20,20 L 20,40 M 20,20 L 40,20"/>
    <path d="M 180,20 L 180,40 M 180,20 L 160,20"/>
    <path d="M 20,180 L 20,160 M 20,180 L 40,180"/>
    <path d="M 180,180 L 180,160 M 180,180 L 160,180"/>
  </g>

  <!-- Label -->
  <text x="25" y="192" font-family="monospace" font-size="7" fill="#664400" opacity="0.8">VOIGHT-KAMPFF // RETINAL SCAN</text>
</svg>
