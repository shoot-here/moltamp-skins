    <line x1="250" y1="0" x2="250" y2="80"/>
    <line x1="300" y1="0" x2="300" y2="80"/>
    <line x1="350" y1="0" x2="350" y2="80"/>
  </g>

  <!-- Center line -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="#332200" stroke-width="1"/>

