<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <filter id="wf-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wf-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.1"/>
      <stop offset="20%" stop-color="#ffaa44" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#ffaa44" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffaa44" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="400" height="80" fill="#060400"/>

  <!-- Grid lines -->
  <g stroke="#1a1200" stroke-width="0.5">
    <line x1="0" y1="20" x2="400" y2="20"/>
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="50" y1="0" x2="50" y2="80"/>
    <line x1="100" y1="0" x2="100" y2="80"/>
    <line x1="150" y1="0" x2="150" y2="80"/>
