      175,40 180,42 185,48 188,55 190,60 192,65 194,60 196,52 198,45 200,40
      205,40 210,38 215,32 218,24 220,16 222,10 224,16 226,26 228,34 230,38 235,40
      240,40 245,42 248,46 250,52 252,56 254,60 256,56 258,50 260,44 262,40
