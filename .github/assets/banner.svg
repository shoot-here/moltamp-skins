<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="50%" stop-color="#0c0c1a"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4d9fff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="textfill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e0f0"/>
      <stop offset="100%" stop-color="#c0c0d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#4d9fff">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Bottom accent line -->
  <rect x="0" y="198" width="900" height="2" fill="url(#accent)" opacity="0.3"/>
  <!-- Title -->
  <text x="450" y="82" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="42" font-weight="700" fill="url(#textfill)" letter-spacing="4">MOLTamp</text>
  <!-- Subtitle -->
  <text x="450" y="115" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="16" fill="#4d9fff" opacity="0.9" letter-spacing="6" text-transform="uppercase">SKINS</text>
  <!-- Tagline -->
  <text x="450" y="150" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="13" fill="#606080" letter-spacing="1">Community themes for the skinnable AI terminal</text>
  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="2" fill="#4d9fff" opacity="0.3"/>
  <rect x="20" y="20" width="2" height="30" fill="#4d9fff" opacity="0.3"/>
  <rect x="850" y="20" width="30" height="2" fill="#a855f7" opacity="0.3"/>
  <rect x="878" y="20" width="2" height="30" fill="#a855f7" opacity="0.3"/>
  <rect x="20" y="178" width="30" height="2" fill="#4d9fff" opacity="0.2"/>
  <rect x="20" y="150" width="2" height="30" fill="#4d9fff" opacity="0.2"/>
  <rect x="850" y="178" width="30" height="2" fill="#a855f7" opacity="0.2"/>
  <rect x="878" y="150" width="2" height="30" fill="#a855f7" opacity="0.2"/>
</svg>
